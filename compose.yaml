services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fazenda_php
    volumes:
      - .:/var/www/html
    ports:
      - "8080:80"
    environment:
      DATABASE_URL: "mysql://app:app@db:3306/fazenda_bovinos?serverVersion=8.0&charset=utf8mb4"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: fazenda_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fazenda_bovinos
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: